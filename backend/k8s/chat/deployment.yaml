apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
        - name: chat
          image: 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/chat:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: PORT
              value: '3003'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: daln-backend-secret
                  key: CHAT_DATABASE_URL
            - name: REDIS_HOST
              value: redis-12407.c274.us-east-1-3.ec2.cloud.redislabs.com
            - name: REDIS_PORT
              value: '12407'
          envFrom:
            - secretRef:
                name: daln-backend-secret
