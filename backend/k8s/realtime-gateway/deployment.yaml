apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realtime-gateway
  template:
    metadata:
      labels:
        app: realtime-gateway
    spec:
      containers:
        - name: realtime-gateway
          image: 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/realtime-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: PORT
              value: '3001'
            - name: REDIS_HOST
              value: redis-12407.c274.us-east-1-3.ec2.cloud.redislabs.com
            - name: REDIS_PORT
              value: '12407'
          envFrom:
            - secretRef:
                name: daln-backend-secret
