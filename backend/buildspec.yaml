version: 0.2

phases: 
  pre_build:
    commands:
      - aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com
  build:
    commands:
      - docker build -t user -f backend/apps/user/Dockerfile backend/apps/user
      - docker tag user:latest 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/user:latest

      - docker build -t realtime-gateway -f backend/apps/realtime-gateway/Dockerfile backend/apps/realtime-gateway
      - docker tag realtime-gateway:latest 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/realtime-gateway:latest

      - docker build -t notification -f backend/apps/notification/Dockerfile backend/apps/notification
      - docker tag notification:latest 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/notification:latest

      - docker build -t chat -f backend/apps/chat/Dockerfile backend/apps/chat
      - docker tag chat:latest 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/chat:latest
  post_build:
    commands:
      - docker push 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/user:latest
      - docker push 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/realtime-gateway:latest
      - docker push 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/notification:latest
      - docker push 435788423238.dkr.ecr.ap-southeast-2.amazonaws.com/chat:latest