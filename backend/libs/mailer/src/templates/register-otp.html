<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP Kich Hoat Tai Khoan</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f4f7fb;
      font-family: Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      width="100%"
      style="padding: 24px 0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            width="560"
            style="
              max-width: 560px;
              background: #ffffff;
              border-radius: 14px;
              overflow: hidden;
              border: 1px solid #e5e7eb;
            "
          >
            <tr>
              <td style="padding: 24px; background: #0f172a; color: #ffffff">
                <h2 style="margin: 0; font-size: 20px; font-weight: 700">
                  Xac Thuc Dang Ky Tai Khoan
                </h2>
              </td>
            </tr>
            <tr>
              <td style="padding: 24px; color: #0f172a">
                <p style="margin: 0 0 12px; font-size: 15px; line-height: 1.6">
                  Xin chao {{name}},
                </p>
                <p style="margin: 0 0 16px; font-size: 15px; line-height: 1.6">
                  Day la ma OTP de kich hoat tai khoan cua ban. Ma co hieu luc
                  trong 5 phut.
                </p>
                <div style="margin: 0 0 18px; text-align: center">
                  <span
                    style="
                      display: inline-block;
                      padding: 12px 22px;
                      letter-spacing: 8px;
                      font-size: 30px;
                      font-weight: 700;
                      color: #0f172a;
                      background: #f8fafc;
                      border: 1px dashed #cbd5e1;
                      border-radius: 12px;
                    "
                    >{{otp}}</span
                  >
                </div>
                <p
                  style="
                    margin: 0;
                    font-size: 13px;
                    line-height: 1.6;
                    color: #475569;
                  "
                >
                  Neu ban khong thuc hien thao tac nay, vui long bo qua email.
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 16px 24px;
                  background: #f8fafc;
                  color: #64748b;
                  font-size: 12px;
                  text-align: center;
                "
              >
                &copy; {{year}} Chat App. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
